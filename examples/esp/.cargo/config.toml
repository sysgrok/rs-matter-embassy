[build]
#target = "riscv32imc-unknown-none-elf"
target = "riscv32imac-unknown-none-elf"
#target = "xtensa-esp32-none-elf"

[target.'cfg(all(target_arch = "riscv32", target_os = "none"))']
runner = "espflash flash --monitor"
rustflags = ["-C", "link-arg=-Tlinkall.x", "-C", "force-frame-pointers"]

[target.'cfg(all(target_arch = "xtensa", target_os = "none"))']
runner  = "espflash flash --monitor"
rustflags = ["-C", "link-arg=-Wl,-Tlinkall.x", "-C", "link-arg=-nostartfiles"]

[unstable]
#build-std-features = ["panic_immediate_abort"]

# For host builds and STD targets
build-std = ["core", "alloc", "panic_abort"]

[env]
DEFMT_LOG="info"
ESP_LOG="info"
# Uncomment and change this if you change the partition table offset (relevant for the light_wifi_persistent example)
#ESP_BOOTLOADER_ESP_IDF_CONFIG_PARTITION_TABLE_OFFSET="0x8000"
