[workspace]
resolver = "2"
members = [
    "rs-matter-embassy",
]

exclude = ["examples"]

[patch.crates-io]
#rs-matter = { git = "https://github.com/project-chip/rs-matter" }
#rs-matter = { git = "https://github.com/sysgrok/rs-matter", branch = "next" }
rs-matter = { git = "https://github.com/sysgrok/rs-matter", branch = "single-lock-3" }
#rs-matter = { path = "../../rs-matter/rs-matter" }
#rs-matter-stack = { git = "https://github.com/ivmarkov/rs-matter-stack.git", branch = "next" }
rs-matter-stack = { git = "https://github.com/ivmarkov/rs-matter-stack.git", branch = "new-lock" }
#rs-matter-stack = { path = "../../rs-matter-stack" }
openthread = { git = "https://github.com/sysgrok/openthread.git", branch = "next" }
#openthread = { path = "../../../openthread/openthread" }
nrf-sdc = { git = "https://github.com/alexmoon/nrf-sdc.git", rev = "43df6b8b0affeacd9cb4094a3ab4f81576554887" }
nrf-mpsl = { git = "https://github.com/alexmoon/nrf-sdc.git", rev = "43df6b8b0affeacd9cb4094a3ab4f81576554887" }
nrf-802154 = { git = "https://github.com/sysgrok/nrf-802154" }
esp-radio = { git = "https://github.com/esp-rs/esp-hal", rev = "e156b5453a8adc123b7a8b6aa08e0698ec87dfe8" }
esp-hal = { git = "https://github.com/esp-rs/esp-hal", rev = "e156b5453a8adc123b7a8b6aa08e0698ec87dfe8" }
#esp-radio = { path = "../../../esp-hal/esp-radio" }
#esp-hal = { path = "../../../esp-hal/esp-hal" }
cyw43 = { git = "https://github.com/embassy-rs/embassy" }
cyw43-pio = { git = "https://github.com/embassy-rs/embassy" }
embassy-rp = { git = "https://github.com/embassy-rs/embassy" }
embassy-net-driver-channel = { git = "https://github.com/embassy-rs/embassy" }
embassy-time-driver = { git = "https://github.com/embassy-rs/embassy" }

[profile.release]
opt-level = "s"

[profile.dev]
debug = true
opt-level = "z"
